services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ECommerceBotDb;User Id=sa;Password=${SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__WebhookSecretToken=${TELEGRAM_WEBHOOK_SECRET}
      - Telegram__AdminChatIds__0=${TELEGRAM_ADMIN_CHAT_ID}
      - Telegram__BackupChannelId=${TELEGRAM_BACKUP_CHANNEL_ID:-0}
      - Redis__ConnectionString=redis:6379
      - Redis__InstanceName=ECommerceBot:
      - Backup__Enabled=${BACKUP_ENABLED:-false}
      - Backup__Directory=/backups
      - Backup__RetentionDays=${BACKUP_RETENTION_DAYS:-7}
      - Backup__ScheduleHours=${BACKUP_SCHEDULE_HOURS:-24}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/Logs
      - backups:/backups
    restart: unless-stopped
    networks:
      - ecommercebot

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - SA_PASSWORD=${SA_PASSWORD:-YourStrong!Passw0rd}
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-YourStrong!Passw0rd}\" -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - ecommercebot

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - ecommercebot

volumes:
  sqlserver_data:
  redis_data:
  backups:

networks:
  ecommercebot:
    driver: bridge
