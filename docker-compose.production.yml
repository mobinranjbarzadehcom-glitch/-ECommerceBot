services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  sqlserver:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.00'
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
